name: backup-secretary-hermes

x-hermes-common: &hermes-common
  image: ${HERMES_IMAGE:-backup-secretary/hermes-agent:local}
  build:
    context: .
    dockerfile: docker/hermes/Dockerfile
    args:
      HERMES_BASE_IMAGE: ${HERMES_BASE_IMAGE:-nousresearch/hermes-agent:latest}
      HERMES_UID: ${HERMES_UID:-1000}
      HERMES_GID: ${HERMES_GID:-1000}
  restart: unless-stopped
  environment:
    HERMES_HOME: /opt/data
    HOME: /opt/data
    HERMES_EXEC_ASK: "1"
  volumes:
    - type: bind
      source: ${HERMES_DATA_DIR:-~/repo/backup-secretary-data/main/hermes-data} # メインhermesデータディレクトリを指定
      target: /opt/data
    - type: bind
      source: ${HERMES_WORKSPACE_DIR:-./workspace}
      target: /workspace
    - type: bind
      source: ${HERMES_MANAGED_SKILLS_DIR:-./skills}
      target: /managed-skills
      read_only: true
  networks:
    - hermes-net
  read_only: ${HERMES_READ_ONLY:-false}
  tmpfs:
    - /tmp:rw,nosuid,size=512m
    - /var/tmp:rw,noexec,nosuid,size=256m
    - /run:rw,noexec,nosuid,size=64m
  cap_drop:
    - ALL
  cap_add:
    - CHOWN
    - SETGID
    - SETUID
  security_opt:
    - no-new-privileges:true
  pids_limit: 256
  mem_limit: ${HERMES_MEMORY_LIMIT:-4g}
  cpus: ${HERMES_CPU_LIMIT:-2}
  shm_size: ${HERMES_SHM_SIZE:-1g}

services:
  hermes:
    <<: *hermes-common
    container_name: ${HERMES_CONTAINER_NAME:-backup-secretary-hermes}
    command: gateway run
    ports:
      - "${HERMES_GATEWAY_BIND:-127.0.0.1}:${HERMES_GATEWAY_PORT:-8642}:8642"
    environment:
      HERMES_HOME: /opt/data
      HOME: /opt/data
      HERMES_EXEC_ASK: "1"
      OPENCLI_CDP_ENDPOINT: "http://chrome:9222"
    depends_on:
      - chrome
    healthcheck:
      test:
        - CMD-SHELL
        - "pgrep -f 'hermes gateway run' >/dev/null"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  dashboard:
    <<: *hermes-common
    container_name: ${HERMES_DASHBOARD_CONTAINER_NAME:-backup-secretary-hermes-dashboard}
    command: dashboard --host 0.0.0.0 --insecure
    profiles:
      - dashboard
    ports:
      - "${HERMES_DASHBOARD_BIND:-127.0.0.1}:${HERMES_DASHBOARD_PORT:-9119}:9119"
    environment:
      HERMES_HOME: /opt/data
      HOME: /opt/data
      GATEWAY_HEALTH_URL: http://hermes:8642
      GATEWAY_HEALTH_TIMEOUT: ${GATEWAY_HEALTH_TIMEOUT:-3}
    depends_on:
      - hermes
    mem_limit: ${HERMES_DASHBOARD_MEMORY_LIMIT:-512m}
    cpus: ${HERMES_DASHBOARD_CPU_LIMIT:-0.5}

  setup:
    <<: *hermes-common
    container_name: ${HERMES_SETUP_CONTAINER_NAME:-backup-secretary-hermes-setup}
    command: setup
    profiles:
      - setup
    restart: "no"
    stdin_open: true
    tty: true

  skills-sync:
    <<: *hermes-common
    container_name: ${HERMES_SKILLS_SYNC_CONTAINER_NAME:-backup-secretary-hermes-skills-sync}
    command: bash -lc "mkdir -p /opt/data/skills && rsync -a /managed-skills/ /opt/data/skills/"
    profiles:
      - skills-sync
    restart: "no"

  cli:
    <<: *hermes-common
    container_name: ${HERMES_CLI_CONTAINER_NAME:-backup-secretary-hermes-cli}
    command: bash
    profiles:
      - cli
    restart: "no"
    stdin_open: true
    tty: true

  hermes-owashota:
    <<: *hermes-common
    container_name: ${HERMES_OWASHOTA_CONTAINER_NAME:-backup-secretary-hermes-owashota}
    command: gateway run
    environment:
      HERMES_HOME: /opt/data
      HOME: /opt/data
      HERMES_EXEC_ASK: "1"
    volumes:
      - type: bind
        source: ${HERMES_OWASHOTA_DATA_DIR:-${HOME}/repo/backup-secretary-data/owashota/hermes-data}
        target: /opt/data
      - type: bind
        source: ${HERMES_WORKSPACE_DIR:-./workspace}
        target: /workspace
      - type: bind
        source: ${HERMES_MANAGED_SKILLS_DIR:-./skills}
        target: /managed-skills
        read_only: true
    ports:
      - "${HERMES_OWASHOTA_GATEWAY_BIND:-127.0.0.1}:${HERMES_OWASHOTA_GATEWAY_PORT:-8643}:8642"
    healthcheck:
      test:
        - CMD-SHELL
        - "pgrep -f 'hermes gateway run' >/dev/null"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: ${HERMES_OWASHOTA_MEMORY_LIMIT:-2g}
    cpus: ${HERMES_OWASHOTA_CPU_LIMIT:-1}
    shm_size: ${HERMES_OWASHOTA_SHM_SIZE:-512m}

  chrome:
    build:
      context: .
      dockerfile: docker/chrome/Dockerfile
    container_name: ${CHROME_CONTAINER_NAME:-backup-secretary-chrome}
    restart: unless-stopped
    networks:
      - hermes-net
    volumes:
      - type: bind
        source: ${CHROME_PROFILE_DIR:-./runtime/chrome-profile}
        target: /data/chrome-profile
    ports:
      - "${CHROME_CDP_BIND:-127.0.0.1}:${CHROME_CDP_PORT:-9222}:9222"
    mem_limit: ${CHROME_MEMORY_LIMIT:-2g}
    cpus: ${CHROME_CPU_LIMIT:-1}
    shm_size: ${CHROME_SHM_SIZE:-1g}
    healthcheck:
      test:
        - CMD-SHELL
        - "curl -sf http://127.0.0.1:9222/json/version >/dev/null"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  open-llm-vtuber:
    image: ${OLLV_IMAGE:-open-llm-vtuber:latest}
    container_name: open-llm-vtuber
    restart: unless-stopped
    networks:
      - hermes-net
    volumes:
      - type: bind
        source: ${OLLV_CONFIG_DIR:-./config/open-llm-vtuber}
        target: /app/config
      - type: bind
        source: ${OLLV_MODELS_DIR:-./runtime/ollv-models}
        target: /app/models
    ports:
      - "${OLLV_PORT:-12393}:12393"
    environment:
      - TZ=Asia/Tokyo

networks:
  hermes-net:
    driver: bridge
